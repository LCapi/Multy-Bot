name: Release and deploy to production

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, publish versioned image and create GitHub release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    outputs:
      release_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven verify
        run: mvn -B -ntp verify

      - name: Extract version from tag
        id: vars
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lcapi/multy-bot
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.vars.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $TAG_NAME already exists. Skipping creation."
          else
            gh release create "$TAG_NAME" --generate-notes
          fi

  deploy:
    name: Deploy tagged version to Hetzner production
    runs-on: ubuntu-latest
    needs: release

    permissions:
      contents: read

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy release on server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          RELEASE_TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          ssh "${HETZNER_USER}@${HETZNER_HOST}" "
            set -Eeuo pipefail
            cd /opt/multy-bot
            export RELEASE_TAG='${RELEASE_TAG}'
            /opt/multy-bot/deploy.sh
          "