name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-test-docker:
    name: Build, test and validate Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven verify
        run: mvn -B -ntp verify

      - name: Build Docker image
        run: docker build -t multy-bot:ci .